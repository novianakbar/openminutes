name: openminutes

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openminutes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openminutes}
      POSTGRES_DB: ${POSTGRES_DB:-openminutes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-openminutes}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      MINIO_BUCKET: ${MINIO_BUCKET:-recordings}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 1; done;
      mc mb -p \"local/$${MINIO_BUCKET}\" || true;
      exit 0"

  api:
    image: openminutes-api:prod
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    image: openminutes-worker:prod
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: openminutes-web:prod
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  bot:
    image: openminutes-bot:prod
    build:
      context: apps/bot
    profiles:
      - build

volumes:
  pgdata:
  miniodata:

networks:
  default:
    name: ${BOT_NETWORK:-openminutes-net}
